<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Recuperar Contraseña - AM Sound</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #343a40 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border-radius: 15px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <h3 class="fw-bold text-center mb-4">Recuperación</h3>
                        <p class="text-muted text-center">Ingresa tu correo para recibir un código de seguridad.</p>

                        {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} small">{{ message }}</div>
                        {% endfor %}
                        {% endif %}

                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" name="correo" class="form-control" placeholder="usuario@correo.com" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 shadow-sm">Enviar Código</button>
                        </form>
                        <div class="mt-3 text-center">
                            <a href="{% url 'login' %}" class="text-decoration-none small">Volver al inicio</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
