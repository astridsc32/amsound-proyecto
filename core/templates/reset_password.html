<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Restablecer Contraseña - AM Sound</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #343a40 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border-radius: 15px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <h3 class="fw-bold text-center mb-4">Nueva Contraseña</h3>

                        {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} small">{{ message }}</div>
                        {% endfor %}
                        {% endif %}

                        <form method="POST" action="{% url 'cambiar_password' %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Código de Verificación</label>
                                <input type="text" name="codigo" class="form-control" placeholder="Ingresa el código de 6 dígitos" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nueva Contraseña</label>
                                <input type="password" name="password" class="form-control" placeholder="Mínimo 12 caracteres" required>
                                <div class="form-text small">Debe incluir Mayúscula, Número y Símbolo.</div>
                            </div>
                            <button type="submit" class="btn btn-success w-100 shadow-sm">Cambiar Contraseña</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
