<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registro - AM Sound</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #343a40 100%);
            min-height: 100vh;
        }

        .card {
            border-radius: 15px;
            border: none;
        }
        #admin_token_section {
            display: none; 
            background-color: #fff3cd;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ffeeba;
        }
    </style>
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">Registro </h2>
                            <p class="text-muted">Crea una cuenta nueva</p>
                        </div>

                        {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            <strong>Aviso:</strong> {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {% endfor %}
                        {% endif %}

                        <form method="POST">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Carnet</label>
                                    <input type="text" name="carnet" class="form-control" placeholder="Ej. 202012345" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Rol</label>
                                    <select name="rol" id="rolSelect" class="form-select" required onchange="toggleAdminToken()">
                                        <option value="empleado">Empleado</option>
                                        <option value="admin">Administrador</option>
                                    </select>
                                </div>
                            </div>

                            <div id="admin_token_section" class="mb-3">
                                <label class="form-label fw-bold text-dark">Código de Autorización Admin</label>
                                <input type="password" name="admin_token" class="form-control" placeholder="Ingrese el código de admin">
                                <small class="text-muted">Requerido solo para cuentas administrativas.</small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" name="nombre" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" name="correo" class="form-control" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Contraseña de Seguridad</label>
                                <input type="password" name="password" class="form-control" required>
                                <div class="form-text text-info">
                                    Mínimo 12 caracteres, Mayúscula, Número y Símbolo.
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 btn-lg shadow-sm">Registrar en el Sistema</button>
                        </form>

                        <div class="mt-4 text-center">
                            <a href="{% url 'login' %}" class="text-decoration-none fw-bold text-secondary">← Volver al Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleAdminToken() {
            const rol = document.getElementById('rolSelect').value;
            const tokenSection = document.getElementById('admin_token_section');
            if (rol === 'admin') {
                tokenSection.style.display = 'block';
            } else {
                tokenSection.style.display = 'none';
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
